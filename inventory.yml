all:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: /home/ansible/.ssh/ansible.key
    env:
      HOSTS: ${{ vars.HOSTS }}
    
    
  children:
    vps:
      hosts:
        ru:
          ansible_host: ${ HOSTS["ru"] }
        kz:
          ansible_host: ${ HOSTS["kz"] }
        eu:
          ansible_host: ${ HOSTS["eu"] }
          
    main_node:
      hosts:
        ru:
          ansible_host: ${ HOSTS["ru"] }

       
    vm_agent:
      hosts:
        kz:
          ansible_host: ${ HOSTS["kz"] }

        
