all:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: /home/ansible/.ssh/ansible.key
    
    
  children:
    vps:
      hosts:
        ru:
          ansible_host: ${{ vars.RU }}
        kz:
          ansible_host: ${{ vars.KZ }}
        eu:
          ansible_host: ${{ vars.EU }}
          
    main_node:
      hosts:
        ru:
          ansible_host: ${{ vars.RU }}

       
    vm_agent:
      hosts:
        kz:
          ansible_host: ${{ vars.KZ }}

        
