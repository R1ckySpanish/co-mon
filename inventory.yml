all:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: /home/ansible/.ssh/ansible.key
    
    
  children:
    vps:
      hosts:
        ru:
          ansible_host: "${{ RU }}"
        kz:
          ansible_host: "${{ KZ }}"
        eu:
          ansible_host: "${{ EU }}"
          
    main_node:
      hosts:
        ru:
          ansible_host: "${{ RU }}"

       
    vm_agent:
      hosts:
        kz:
          ansible_host: "${{ KZ }}"

        
