all:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: /home/ansible/.ssh/ansible.key  
    ansible_host_key_checking: false

  children:
    vps:
      hosts:
        ru:
          ansible_host: $RU
        kz:
          ansible_host: $KZ
        eu_alias:
          ansible_host: "51.38.152.67"
          
    main_node:
      hosts:
        ru:
          ansible_host: $RU

       
    vm_agent:
      hosts:
        kz:
          ansible_host: $KZ

        
