name: CI
on:
  push:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      HOSTS: ${{ vars.HOSTS }}

    steps:
    
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Parse HOSTS and generate inventory.yml
        run: |
          RU_IP=${HOSTS["ru"]}
          KZ_IP=${HOSTS["kz"]}
          EU_IP=${HOSTS["eu"]}

          cat <<'EOF' > inventory.yml

      - name: check inventory.yml
        run: |
          pwd
          cat inventory.yml
