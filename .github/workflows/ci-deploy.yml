name: CI
on:
  push:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      HOSTS: "${{ vars.HOSTS }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Parse HOSTS and generate inventory.yml
        run: |
          RU_IP=$(echo $HOSTS | jq -r '.ru')
          KZ_IP=$(echo $HOSTS | jq -r '.kz')
          EU_IP=$(echo $HOSTS | jq -r '.eu')

          cat <<EOF > inventory.yml
all:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: /home/ansible/.ssh/ansible.key

  children:
    vps:
      hosts:
        ru:
          ansible_host: $RU_IP
        kz:
          ansible_host: $KZ_IP
        eu:
          ansible_host: $EU_IP

    main_node:
      hosts:
        ru:
          ansible_host: $RU_IP

    vm_agent:
      hosts:
        kz:
          ansible_host: $KZ_IP
EOF

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i inventory.yml playbook.yml
