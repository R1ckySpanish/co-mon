name: CI
on:
  push:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: make inventory-dev.yml
        run: |
          cat > inventory-dev.yml <<EOF
          all:
            hosts:
              ru:
                ansible_host: $(echo "$HOSTS_JSON" | jq -r .ru)
              kz:
                ansible_host: $(echo "$HOSTS_JSON" | jq -r .kz)
              eu:
                ansible_host: $(echo "$HOSTS_JSON" | jq -r .eu)
          EOF    


          

      - name: Add SSH key
        run: |
          eval $(ssh-agent -s)
          echo "${{ secrets.SSH_KEY }}" | tr -d "\r" | ssh-add -


      - name: Run playbook
        run: |
          cat inventory-dev.yml
          ansible-playbook -i inventory-dev.yml playbook.yml -e "HOSTS_JSON=some_value"
          eval "${(ssh-agent -k)}"
