name: CI
on:
  push:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
#    env:
#      HOSTS_JSON: ${{ vars.HOSTS_JSON }}

    
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible
          

      - name: Add SSH key
        run: |
          eval $(ssh-agent -s)
          echo "${{ secrets.SSH_KEY }}" | tr -d "\r" | ssh-add -


      - name: Run playbook
        run: |
          cat inventory.yml
          ansible-playbook -i inventory.yml playbook.yml  # -e "HOSTS_JSON=$HOSTS_JSON"
          eval "$(ssh-agent -k)"
